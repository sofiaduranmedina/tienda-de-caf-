<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="stylesheet" href="./css/login.css">
<link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">

</head>

<body>

<nav>
    <div class="logo">
        ☕ <span>Coffe</span>
    </div>

    <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="galeria.html">Galeria</a></li>
        <li><a href="contacto.html">Contactenos</a></li>
        <li><a href="carrito.html">🛒</a></li>
        <li><a href="login.html" class="active">👤</a></li>
    </ul>
</nav>


<section class="login-container">

    <div class="login-card">

        <div class="user-icon">👤</div>
        <h2>Bienvenido de vuelta</h2>

        <form>

            <label>Correo electrónico</label>
            <input type="email" placeholder="">

            <label>Contraseña</label>
            <input type="password" placeholder="">

            <div class="options">
                <label>
                    <input type="checkbox">
                    Recordarme
                </label>

                <a href="#" class="forgot">¿Olvidaste la contraseña?</a>
            </div>

            <button class="login-btn">Iniciar sesión</button>

        </form>

        <div class="divider">
            <span>Continua con</span>
        </div>

        <div class="social-login">
            <button class="google">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
                Google
            </button>

            <button class="facebook">
                <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
                Facebook
            </button>
        </div>

        <p class="register">
            ¿No tienes una cuenta?
            <a href="#">Regístrate aquí</a>
        </p>

    </div>

    <div class="login-image">
        <h1>El mejor cafe</h1>
        <img src="./img/coffee-hero-section.png">
    </div>

</section>

</body>
</html>
