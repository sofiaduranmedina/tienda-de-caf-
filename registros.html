<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="stylesheet" href="./css/registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Miniver&display=swap" rel="stylesheet">
</head>

<body>

    <nav>
        <div class="logo">
            ☕ <span>Coffe</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="galeria.html">Galeria</a></li>
            <li><a href="contacto.html">Contactenos</a></li>
            <li><a href="carrito.html">🛒</a></li>
            <li><a href="login.html" class="active">👤</a></li>
        </ul>
    </nav>


    <section class="registro-container">
        <div class="registro-card">

            <div class="user-icon">
                👤
            </div>

            <h2>¡Únete a Coffe shop!</h2>

            <form>
                <label>Número de Identificación</label>
                <input type="text">
                <div class="grid-nombre">
                    <div>
                        <label>Nombre</label>
                        <input type="text">
                    </div>
                    <div>
                        <label>Apellidos</label>
                        <input type="text">
                    </div>

                </div>

                <label>Edad</label>
                <input type="number">
                <label>Correo Electrónico</label>
                <input type="email">
                <label>Teléfono</label>
                <input type="text">
            </form>

        </div>

        <div class="registro-card">

            <form>
                <label>Contraseña</label>
                <input type="password">
                <label>Confirmar contraseña</label>
                <input type="password">

                <p class="terminos">
                    Acepto los 
                    <a href="#">términos y condiciones</a> 
                    y la 
                    <a href="#">política de privacidad</a>
                </p>

                <button class="btn-registrar">
                    Registrarme
                </button>
            </form>

        </div>

        <div class="registro-imagen">
            <h1>Refresca tu paladar</h1>
            <img src="./img/cold-beverages.png">
            <img src="./img/refreshment.png">

        </div>

    </section>

</body>
</html>
