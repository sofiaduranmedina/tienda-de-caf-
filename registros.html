<body>

<nav>
  <div class="logo">
    ☕ <span>Coffe</span>
  </div>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html">Menu</a></li>

    <section class="registro-container">
        <div class="registro-card">
            <div class="user-icon">👤</div>
            <h2>¡Únete a Coffe shop!</h2>
            <form>
                <label>Número de Identificación</label>
                <input type="text">

                <div class="grid-nombre">
                    <div>
                        <label>Nombre</label>
                        <input type="text">
                    </div>
                    <div>
                        <label>Apellidos</label>
                        <input type="text">
                    </div>
                </div>

                <label>Edad</label>
                <input type="text">

                <label>Correo Electrónico</label>
                <input type="email">

                <label>Teléfono</label>
                <input type="text">
            </form>
        </div>

        <div class="registro-card">
            <form>
                <label>Contraseña</label>
                <input type="password">

                <label>Confirmar contraseña</label>
                <input type="password">

                <p class="terminos">
                    Acepto los 
                    <a href="#">términos y condiciones</a> 
                    y la 
                    <a href="#">política de privacidad</a>
                </p>

                <div class="btn-container">
                    <button class="btn-registrar">Registrarme</button>
                </div>
            </form>
        </div>

        <div class="registro-imagen">
            <h1>Refresca tu <br>
                paladar</h1>
            <img src="./img/imagen bebidas.jpeg" alt="Bebidas frías">
        </div>

    </section>

</body>
